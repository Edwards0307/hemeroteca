services:
  postgres:
    image: postgres:16-alpine
    container_name: hemeroteca_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Hemeroteca2024!
      POSTGRES_DB: HemerotecaDB
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hemeroteca_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=HemerotecaDB;Username=postgres;Password=Hemeroteca2024!
    ports:
      - "5000:8080"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hemeroteca_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
